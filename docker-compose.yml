services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: findociq
      POSTGRES_PASSWORD: findociq
      POSTGRES_DB: findociq
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U findociq" ]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080" # Maps Adminer to 8081 to leave 8080 for the Go gateway
    depends_on:
      db:
        condition: service_healthy

  gateway:
    build: ./gateway
    env_file: .env
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8080/healthz || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  ingestion:
    build: ./services/ingestion
    env_file: .env
    ports:
      - "${INGESTION_PORT:-8001}:8001"
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/healthz').raise_for_status()" ]
      interval: 10s
      timeout: 5s
      retries: 3

  extraction:
    build: ./services/extraction
    env_file: .env
    ports:
      - "${EXTRACTION_PORT:-8002}:8002"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8002/healthz').raise_for_status()" ]
      interval: 10s
      timeout: 5s
      retries: 3

  rag:
    build: ./services/rag
    env_file: .env
    ports:
      - "${RAG_PORT:-8003}:8003"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8003/healthz').raise_for_status()" ]
      interval: 10s
      timeout: 5s
      retries: 3

  ui:
    build: ./ui
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
